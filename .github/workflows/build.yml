
on:
  workflow_dispatch:

name: Build Release
jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@master # checkout 代码
      - uses: actions/setup-go@v6 # 配置 Go 环境
        with:
          go-version: "1.25" # 改成自己的版本

      - run: bash .cross_compile.sh


      - name: Set TAG_DATE
        run: echo "TAG_DATE=$(date +%Y%m%d%H%M)" >> $GITHUB_ENV

      - name: Release
        uses: softprops/action-gh-release@v1
        with: # 将下述可执行文件 release 上去
          token: ${{ secrets.GITHUB_TOKEN }}
          tag_name: v3.1.1-${{ env.TAG_DATE }}
          name: v3.1.1-${{ env.TAG_DATE }}
          files: |
            dist/nf_darwin_amd64
            dist/nf_darwin_arm64
            dist/nf_linux_amd64
            dist/nf_linux_arm64
            dist/nf_linux_s390x
            dist/nf_linux_mips
            draft: false
            prerelease: true
            make_latest: false
